<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngiMind // Engineering & Science Quiz</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0e14;
            --card-bg: #161b22;
            --accent-blue: #00f2ff;
            --accent-green: #39ff14;
            --accent-red: #ff3131;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Grid Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            z-index: 1;
        }

        /* Header & Stats */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 3.5rem;
            letter-spacing: 4px;
            color: var(--accent-blue);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            margin-bottom: 10px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-blue);
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        /* Quiz Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            transition: var(--transition);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            text-align: left;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent-blue);
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background: rgba(57, 255, 20, 0.15) !important;
            border-color: var(--accent-green) !important;
            color: var(--accent-green);
        }

        .option-btn.wrong {
            background: rgba(255, 49, 49, 0.15) !important;
            border-color: var(--accent-red) !important;
            color: var(--accent-red);
        }

        /* Explanation Section */
        .explanation {
            margin-top: 1.5rem;
            padding: 1rem;
            border-left: 3px solid var(--accent-blue);
            background: rgba(0, 242, 255, 0.05);
            font-size: 0.85rem;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .next-btn {
            margin-top: 1.5rem;
            width: 100%;
            background: var(--accent-blue);
            color: var(--bg-color);
            border: none;
            padding: 12px;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.5rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            display: none;
            transition: var(--transition);
        }

        .next-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* Results Screen */
        #results-screen {
            display: none;
            text-align: center;
        }

        .result-stat {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .final-score {
            font-size: 4rem;
            font-family: 'Bebas Neue';
            color: var(--accent-blue);
            margin: 1rem 0;
        }

        /* Footer */
        footer {
            margin-top: 3rem;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.95);
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .card { padding: 1.5rem; }
            .question-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>EngiMind</h1>
            <div class="stats-bar">
                <span id="question-counter">Question: 1/10</span>
                <span id="live-score">Score: 0</span>
            </div>
            <div class="progress-container">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen">
            <div class="card" id="quiz-card">
                <div id="question-container">
                    <p class="question-text" id="question-text">Loading sensor data...</p>
                    <div class="options-grid" id="options-grid">
                        <!-- Options injected by JS -->
                    </div>
                </div>
                <div class="explanation" id="explanation">
                    <strong>SYSTEM LOG:</strong> <span id="explanation-text"></span>
                </div>
                <button class="next-btn" id="next-btn" onclick="handleNext()">Next Module</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen">
            <div class="card">
                <h2 style="font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--accent-blue);">Mission Complete</h2>
                <div class="final-score" id="final-score">0%</div>
                <div class="result-stat" id="correct-count" style="color: var(--accent-green);"></div>
                <div class="result-stat" id="wrong-count" style="color: var(--accent-red);"></div>
                <button class="next-btn" style="display: block;" onclick="restartQuiz()">Restart System</button>
            </div>
        </div>
    </div>

    <footer>Built by Chidrexx</footer>

    <script>
        const quizData = [
            {
                question: "According to the Second Law of Thermodynamics, what happens to the total entropy of an isolated system over time?",
                options: ["It decreases", "It remains constant", "It increases", "It fluctuates periodically"],
                correct: 2,
                info: "Entropy is a measure of disorder. The Second Law states that in any cyclic process, the entropy will either increase or remain the same."
            },
            {
                question: "What is the primary function of a capacitor in an electrical circuit?",
                options: ["To block all current", "To store electrical energy in a field", "To increase voltage indefinitely", "To convert AC to DC"],
                correct: 1,
                info: "Capacitors store energy in an electric field between two conducting plates, commonly used for filtering and timing."
            },
            {
                question: "Which material property describes a material's resistance to localized plastic deformation (e.g., a scratch)?",
                options: ["Toughness", "Ductility", "Hardness", "Elasticity"],
                correct: 2,
                info: "Hardness is the measure of resistance to surface indentation or abrasion. Diamond is the hardest natural material."
            },
            {
                question: "In classical mechanics, what is Newton's Second Law of Motion?",
                options: ["F = G(m1m2/r²)", "E = mc²", "F = ma", "PV = nRT"],
                correct: 2,
                info: "Force equals mass times acceleration. This defines the relationship between an object's mass and the force needed to accelerate it."
            },
            {
                question: "What is the atomic number of Carbon, the backbone of organic chemistry?",
                options: ["12", "6", "14", "8"],
                correct: 1,
                info: "Carbon has 6 protons in its nucleus. While C-12 is its most common isotope, the atomic number is always 6."
            },
            {
                question: "Which of these describes Hooke's Law within the elastic limit?",
                options: ["Stress is proportional to Strain", "Pressure equals Force/Area", "Entropy always increases", "Velocity is constant"],
                correct: 0,
                info: "Hooke's Law (F=kx) states that the strain of a material is proportional to the applied stress within the elastic limit."
            },
            {
                question: "What is 'Absolute Zero' in the Celsius scale?",
                options: ["0°C", "-100°C", "-273.15°C", "-459.67°C"],
                correct: 2,
                info: "Absolute zero (0 Kelvin) is the lowest possible temperature where thermal motion ceases, equivalent to -273.15°C."
            },
            {
                question: "A fluid with high viscosity will likely:",
                options: ["Flow very quickly", "Resist flow and move slowly", "Boil at room temperature", "Conduct electricity easily"],
                correct: 1,
                info: "Viscosity is a measure of a fluid's resistance to deformation. Honey has high viscosity compared to water."
            },
            {
                question: "What is the standard unit of Power?",
                options: ["Joule", "Newton", "Watt", "Pascal"],
                correct: 2,
                info: "One Watt (W) is defined as one Joule of work done per second."
            },
            {
                question: "Which crystal structure is known for having the highest packing factor (0.74)?",
                options: ["Simple Cubic", "Body-Centered Cubic (BCC)", "Face-Centered Cubic (FCC)", "Diamond Cubic"],
                correct: 2,
                info: "FCC and HCP structures have the highest Atomic Packing Factor of 0.74, representing the most efficient way to pack spheres."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let answered = false;

        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const explanation = document.getElementById('explanation');
        const explanationText = document.getElementById('explanation-text');
        const nextBtn = document.getElementById('next-btn');
        const progressFill = document.getElementById('progress-fill');
        const questionCounter = document.getElementById('question-counter');
        const liveScoreDisplay = document.getElementById('live-score');
        const quizCard = document.getElementById('quiz-card');

        function initQuiz() {
            showQuestion();
        }

        function showQuestion() {
            const q = quizData[currentQuestion];
            answered = false;
            
            // Update UI
            questionCounter.innerText = `Question: ${currentQuestion + 1}/${quizData.length}`;
            progressFill.style.width = `${(currentQuestion / quizData.length) * 100}%`;
            
            // Animation
            quizCard.style.opacity = '0';
            setTimeout(() => {
                questionText.innerText = q.question;
                optionsGrid.innerHTML = '';
                explanation.style.display = 'none';
                nextBtn.style.display = 'none';

                q.options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => selectOption(index);
                    optionsGrid.appendChild(btn);
                });
                
                quizCard.style.opacity = '1';
            }, 300);
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;

            const q = quizData[currentQuestion];
            const buttons = optionsGrid.getElementsByClassName('option-btn');
            
            if (index === q.correct) {
                buttons[index].classList.add('correct');
                score += 10;
                correctCount++;
            } else {
                buttons[index].classList.add('wrong');
                buttons[q.correct].classList.add('correct');
                wrongCount++;
            }

            // Lock buttons
            Array.from(buttons).forEach(btn => btn.disabled = true);

            // Show explanation
            explanationText.innerText = q.info;
            explanation.style.display = 'block';
            nextBtn.style.display = 'block';
            
            // Update score
            liveScoreDisplay.innerText = `Score: ${score}`;
        }

        function handleNext() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            progressFill.style.width = '100%';
            document.getElementById('quiz-screen').style.display = 'none';
            const resultsScreen = document.getElementById('results-screen');
            resultsScreen.style.display = 'block';
            resultsScreen.style.animation = 'fadeIn 0.6s ease';

            document.getElementById('final-score').innerText = `${(score / (quizData.length * 10)) * 100}%`;
            document.getElementById('correct-count').innerText = `Correct Responses: ${correctCount}`;
            document.getElementById('wrong-count').innerText = `Errors Logged: ${wrongCount}`;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            correctCount = 0;
            wrongCount = 0;
            liveScoreDisplay.innerText = `Score: 0`;
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            showQuestion();
        }

        // Start
        initQuiz();
    </script>
</body>
</html>
